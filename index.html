<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification Required</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="overlay" class="hidden"></div>
    
    <div id="game-container">
        <!-- Initial loading screen -->
        <div id="loading-screen">
            <div class="loader"></div>
            <p>Initializing security verification...</p>
        </div>

        <!-- Main CAPTCHA interface -->
        <div id="captcha-container" class="hidden">
            <div id="captcha-header">
                <div class="recaptcha-logo">
                    <div class="checkbox-container">
                        <input type="checkbox" id="robot-checkbox" disabled>
                        <span class="checkmark"></span>
                    </div>
                    <span class="robot-text">I'm not a robot</span>
                </div>
                <div class="recaptcha-brand">
                    <span class="recaptcha-terms">reCAPTCHA</span>
                    <span class="recaptcha-privacy">Privacy - Terms</span>
                </div>
            </div>

            <div id="captcha-challenge" class="hidden">
                <div id="challenge-header">
                    <p id="challenge-instruction">Select all images with <strong id="challenge-target">traffic lights</strong></p>
                    <p id="challenge-subtext">Click verify once there are none left.</p>
                </div>
                
                <div id="image-grid">
                    <!-- 9 image tiles generated by JS -->
                </div>

                <div id="challenge-footer">
                    <button id="skip-btn" class="challenge-btn">SKIP</button>
                    <button id="verify-btn" class="challenge-btn primary">VERIFY</button>
                </div>
            </div>

            <!-- Text input challenge (for later levels) -->
            <div id="text-challenge" class="hidden">
                <div id="text-header">
                    <p id="text-instruction">Type your response below</p>
                </div>
                <input type="text" id="text-input" placeholder="Type here...">
                <button id="text-submit" class="challenge-btn primary">SUBMIT</button>
            </div>

            <!-- Progress indicator -->
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </div>

        <!-- Glitch overlay -->
        <div id="glitch-overlay" class="hidden"></div>

        <!-- End screen -->
        <div id="end-screen" class="hidden">
            <div id="end-content">
                <p id="end-message"></p>
            </div>
        </div>
    </div>

    <!-- Sound toggle button -->
    <button id="sound-toggle" title="Toggle Sound">🔊</button>

    <script src="js/audio.js"></script>
    <script src="js/levels.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
